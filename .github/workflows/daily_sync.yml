name: Update Daily Threat Intelligence

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Aggregator
        id: aggregator
        run: |
          python aggregator.py
          echo "bin_file=$(ls threat-intel-*.bin | head -1)" >> $GITHUB_OUTPUT
          echo "sha256_file=$(ls threat-intel-*.sha256 | head -1)" >> $GITHUB_OUTPUT

      - name: Set Timestamp
        id: timestamp
        run: |
          echo "value=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Update Latest Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "Daily Threat Intelligence v1.0"
          body: "Auto-generated threat intelligence feed. Last updated: ${{ steps.timestamp.value }}"
          artifacts: "${{ steps.aggregator.outputs.bin_file }},${{ steps.aggregator.outputs.sha256_file }},latest.json"
          replacesArtifacts: true
          makeLatest: true
          prerelease: false

      - name: Create Versioned Release
        uses: ncipollo/release-action@v1
        with:
          tag: "v1.0-${{ github.run_number }}"
          name: "Threat Intelligence v1.0 - Build ${{ github.run_number }}"
          body: "Versioned threat intelligence feed. Last updated: ${{ steps.timestamp.value }}"
          artifacts: "${{ steps.aggregator.outputs.bin_file }},${{ steps.aggregator.outputs.sha256_file }},latest.json"
          makeLatest: false
          prerelease: false 

