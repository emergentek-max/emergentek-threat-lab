name: Update Daily Threat Map

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mmh3 bitarray

      - name: Run Aggregator
        run: python aggregator.py 

      - name: Update Latest Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "Daily Threat Intelligence"
          body: "Auto-generated threat map. Last updated: ${{ github.event.head_commit.timestamp || github.sha }}"
          artifacts: "daily_filter.bin"
          replacesArtifacts: true
          makeLatest: true
          prerelease: false 

